<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | CasaCuidado Pro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body id="appBody">

    <header>
        <div class="logo" onclick="window.location.href='index.html'">🏠 CasaCuidado<span>Pro</span></div>
        <div class="auth-buttons">
            <a href="index.html" class="btn-outline">Volver</a>
        </div>
    </header>

    <main class="auth-page-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h2>¡Hola de nuevo!</h2>
                <p class="subtitle">Introduce tus datos para acceder</p>
            </div>
            
            <form id="form-login">
                <div class="form-group">
                    <label>Correo electrónico</label>
                    <input type="email" placeholder="ejemplo@correo.com" required>
                </div>
                
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-primary full">Entrar ahora</button>
            </form>

            <div class="register-hint">
                ¿Aún no tienes cuenta? <a href="registro.html">Regístrate gratis</a>
            </div>
        </div>
    </main>

    <script src="js/scripts.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
