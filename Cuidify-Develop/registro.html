<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | CasaCuidado Pro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body id="appBody">

    <header>
        <div class="logo" onclick="window.location.href='index.html'">🏠 CasaCuidado<span>Pro</span></div>
        <div class="auth-buttons">
            <a href="index.html" class="btn-outline">Volver al inicio</a>
        </div>
    </header>

    <main class="auth-center">
        <div class="register-card-wide">
            <div class="text-center" style="margin-bottom: 30px;">
                <h2 style="font-size: 2.2rem; font-weight: 800;">Crea tu cuenta</h2>
                <p style="color: var(--text-muted);">Únete a la red más segura de asistencia doméstica</p>
            </div>

            <div class="role-selector">
                <button id="tab-worker" class="role-btn active">👷 Soy Cuidador</button>
                <button id="tab-employer" class="role-btn">🏠 Busco Cuidados</button>
            </div>

            <form id="form-register">
                <div class="form-grid">
                    <h3 class="step-title">Datos Personales</h3>
                    <div class="form-group">
                        <label>Nombre</label>
                        <input type="text" name="nombre" placeholder="Ej: María" required>
                    </div>
                    <div class="form-group">
                        <label>Apellidos</label>
                        <input type="text" name="apellidos" placeholder="Ej: García López" required>
                    </div>
                    <div class="form-group">
                        <label>Correo electrónico</label>
                        <input type="email" name="email" placeholder="maria@ejemplo.com" required>
                    </div>
                    <div class="form-group">
                        <label>Contraseña</label>
                        <input type="password" name="pass" placeholder="••••••••" required>
                    </div>

                    <div id="block-cuidador" class="form-group full">
                        <h3 class="step-title">Perfil Profesional</h3>
                        <label>Sobre ti y tu experiencia</label>
                        <textarea name="bio" rows="4" placeholder="Cuéntanos tus años de experiencia, especialidades o por qué te apasiona cuidar..."></textarea>
                    </div>

                    <div id="block-familia" class="form-group full" style="display:none;">
                        <h3 class="step-title">Información del Servicio</h3>
                        <div class="form-group">
                            <label>¿Para quién solicitas el cuidado?</label>
                            <select id="select-target" name="target">
                                <option value="self">Para mí mismo/a</option>
                                <option value="other">Para un familiar (Padres, hijos, etc.)</option>
                            </select>
                        </div>

                        <div id="box-third-party" class="sliding-form-block">
                            <div class="form-grid" style="background: var(--bg-light); padding: 20px; border-radius: var(--radius-md);">
                                <div class="form-group">
                                    <label>Nombre del familiar</label>
                                    <input type="text" name="nombre_familiar" placeholder="Nombre completo">
                                </div>
                                <div class="form-group">
                                    <label>Parentesco</label>
                                    <input type="text" name="parentesco" placeholder="Ej: Madre, Abuelo...">
                                </div>
                                <div class="form-group">
                                    <label>Edad</label>
                                    <input type="number" name="edad_familiar" placeholder="Años">
                                </div>
                                <div class="form-group">
                                    <label>Ubicación</label>
                                    <input type="text" name="ubicacion" placeholder="Ciudad o zona">
                                </div>
                                <div class="form-group full">
                                    <label>Observaciones o necesidades especiales</label>
                                    <textarea name="detalles_familiar" rows="2" placeholder="Ej: Movilidad reducida, Alzheimer, medicación específica..."></textarea>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div style="margin-top: 30px;">
                    <button type="submit" class="btn-primary full">Completar Registro</button>
                </div>
            </form>

            <div class="register-hint">
                ¿Ya eres miembro? <a href="login.html">Inicia sesión aquí</a>
            </div>
        </div>
    </main>

    <script src="js/scripts.js"></script>
    <script src="js/registro.js"></script>
</body>
</html>
