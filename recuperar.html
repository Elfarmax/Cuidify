<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recuperar Acceso | CasaCuidado Pro</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body class="bg-light">
    <header>
      <div
        class="logo"
        onclick="window.location.href = 'index.html'"
        style="cursor: pointer"
      >
        <img src="imagenes/logo (2).png" alt="Logo" class="logo-img" />
        CasaCuidado<span>Pro</span>
      </div>

      <div style="display: flex; gap: 15px; align-items: center">
        <span id="auth-section"></span>
      </div>
    </header>

    <main class="auth-page-wrapper">
      <div class="auth-card">
        <h2>Recuperar contraseña</h2>
        <p class="subtitle" id="stepText">
          Introduce tu email para recibir un código de seguridad.
        </p>

        <div id="step1">
          <div class="form-group">
            <label>Correo electrónico</label>
            <input type="email" id="userEmail" placeholder="tu@email.com" />
          </div>
          <button class="btn-primary full" id="btnSendCode">
            Enviar código
          </button>
        </div>

        <div id="step2" style="display: none">
          <div class="form-group">
            <label>Código de seguridad (6 dígitos)</label>
            <input
              type="text"
              id="verifyCode"
              placeholder="000000"
              maxlength="6"
            />
          </div>
          <div class="form-group">
            <label>Nueva contraseña</label>
            <input type="password" id="newPass" placeholder="••••••••" />
          </div>
          <button class="btn-primary full" id="btnResetPass">
            Cambiar contraseña
          </button>
        </div>

        <div class="register-hint">
          <a href="login.html">Volver al inicio de sesión</a>
        </div>
      </div>
    </main>

    <script src="js/script.js"></script>
    <script src="js/recuperar.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
